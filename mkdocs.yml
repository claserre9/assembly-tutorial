site_name: Tutoriel Assembleur x86-64
site_description: "Un tutoriel complet d'assembleur x86-64 avec 19 chapitres répartis sur 3 niveaux et un projet capstone"
site_author: Clifford
copyright: "MIT License"
repo_url: https://github.com/claserre9/assembly-tutorial

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

